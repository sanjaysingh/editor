<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A lightweight offline code editor with syntax highlighting and formatting">
    <!-- Set this to your Worker base URL when not on the same origin, e.g. https://editor-live-share.your-subdomain.workers.dev -->
    <meta name="live-share-base" content="https://editor-live-share-api.sanjaysingh.net">
    <title>Offline Code Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=__CACHE_VERSION__">
</head>

<body>
    <header id="top-panel">
        <h1 id="title">Offline Code Editor</h1>
        <div id="file-path" aria-live="polite">No file opened</div>
        <nav id="toolbar">
            <button id="open-file-btn" aria-label="Open File" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-folder-open"></i>
            </button>
            <input type="file" id="file-input" aria-hidden="true">
            <button id="format-btn" aria-label="Format Code" onclick="formatCode()">
                <i class="fas fa-indent"></i>
            </button>
            <select id="language-select" aria-label="Select Language">
                <!-- Options will be populated by JavaScript -->
            </select>
            <select id="theme-select" aria-label="Select Theme">
                <!-- Theme options will be populated by JavaScript -->
            </select>
            <button id="live-share-menu-btn" aria-label="Live Share" title="Live Share">
                <i class="fas fa-signal"></i>
            </button>
        </nav>
    </header>
    <main id="editor-container" role="application" aria-label="Code Editor"></main>
    <div id="live-indicator" class="live-indicator" style="display:none"></div>
    <div id="drop-zone" aria-hidden="true">
        <div id="drop-zone-text">Drop file here to open</div>
    </div>

    <div id="share-modal" class="modal" style="display:none">
      <div class="modal-content">
        <h3>Live Share Started</h3>
        <div class="share-info-rows">
          <div class="share-info-row">
            <label>Session Key</label>
            <div class="share-info-value">
              <span id="share-key"></span>
              <button id="copy-key-btn" class="icon-btn" title="Copy Session Key"><i class="fas fa-copy"></i></button>
            </div>
          </div>
          <div class="share-info-row">
            <label>Session URL</label>
            <div class="share-info-value">
              <input id="share-link" readonly>
              <button id="copy-link-btn" class="icon-btn" title="Copy Session URL"><i class="fas fa-copy"></i></button>
            </div>
          </div>
          <div id="share-encryption-row" class="share-info-row" style="display:none">
            <label>Encryption Key</label>
            <div class="share-info-value">
              <span id="share-encryption-key"></span>
              <button id="copy-encryption-key-btn" class="icon-btn" title="Copy Encryption Key"><i class="fas fa-copy"></i></button>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="close-modal-btn" class="primary-btn">Close</button>
        </div>
      </div>
    </div>

    <div id="join-modal" class="modal" style="display:none">
      <div class="modal-content">
        <h3>Join Session</h3>
        <div class="join-info-rows">
          <div class="join-info-row">
            <label>Session Key</label>
            <input id="join-key-input" placeholder="ABC-234" maxlength="7" inputmode="latin" autocomplete="off" autocapitalize="characters">
          </div>
          <div class="join-info-row">
            <label>Encryption Key <span class="optional-label">(leave empty for unencrypted sessions)</span></label>
            <input id="join-encryption-key-input" placeholder="ABCDEF" maxlength="6" inputmode="latin" autocomplete="off" autocapitalize="characters" title="6-character encryption key from host (optional for unencrypted sessions)">
          </div>
        </div>
        <div class="modal-actions">
          <button id="join-cancel-btn">Cancel</button>
          <button id="join-confirm-btn" class="primary-btn">Join</button>
        </div>
      </div>
    </div>

    <script src="app.js?v=__CACHE_VERSION__"></script>
    <script src="crypto-utils.js?v=__CACHE_VERSION__"></script>
    <script src="live-share.js?v=__CACHE_VERSION__"></script>
</body>

</html>
